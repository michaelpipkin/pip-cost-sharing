<h1 mat-dialog-title data-testid="edit-category-title">Edit Category</h1>
<form data-testid="edit-category-form" aria-label="Edit category form" (submit)="$event.preventDefault()">
  <mat-dialog-content data-testid="edit-category-content">
    <div class="content" data-testid="edit-category-fields">
      <mat-form-field appearance="fill" data-testid="edit-category-name-field">
        <mat-label>Category name</mat-label>
        <input
          matInput
          [formField]="editCategoryForm.categoryName"
          data-testid="edit-category-name-input"
          aria-label="Category name"
        />
        @for (
          error of editCategoryForm.categoryName().errors();
          track error;
          let i = $index
        ) {
          <mat-error [attr.data-testid]="'edit-category-name-error-' + i">
            {{ error.message }}
          </mat-error>
        }
      </mat-form-field>
    </div>
    <div class="toggle" data-testid="edit-category-toggles">
      <mat-slide-toggle
        [formField]="editCategoryForm.active"
        data-testid="edit-category-active-toggle"
        aria-label="Category is active"
      >
        Active
      </mat-slide-toggle>
    </div>
  </mat-dialog-content>
  <mat-dialog-actions data-testid="edit-category-actions">
    <button
      mat-raised-button
      class="btn-secondary"
      type="submit"
      defaultButton
      [disabled]="
        !editCategoryForm().valid() ||
        !editCategoryForm().dirty() ||
        editCategoryForm().disabled()
      "
      (click)="onSubmit()"
      data-testid="edit-category-save-button"
      aria-label="Save category changes"
    >
      Save
    </button>
    <button
      mat-raised-button
      type="button"
      class="btn-danger"
      [disabled]="editCategoryForm().disabled()"
      (click)="deleteCategory()"
      data-testid="delete-category-button"
      aria-label="Delete category"
    >
      Delete
    </button>
    <button
      mat-stroked-button
      type="button"
      [disabled]="editCategoryForm().disabled()"
      [mat-dialog-close]="{ success: false }"
      data-testid="edit-category-cancel-button"
      aria-label="Cancel editing category"
    >
      Cancel
    </button>
  </mat-dialog-actions>
</form>
