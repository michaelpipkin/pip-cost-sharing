<h1 mat-dialog-title data-testid="add-member-title">Add Member</h1>
<form data-testid="add-member-form" aria-label="Add member form" (submit)="$event.preventDefault()">
  <mat-dialog-content class="content" data-testid="add-member-content">
    <mat-form-field appearance="fill" data-testid="member-name-field">
      <mat-label>Name</mat-label>
      <input
        matInput
        [formField]="addMemberForm.displayName"
        data-testid="member-name-input"
        aria-label="Member name"
      />
      @for (error of addMemberForm.displayName().errors(); track error.kind; let i = $index) {
        <mat-error [attr.data-testid]="'member-name-error-' + i">
          {{ error.message }}
        </mat-error>
      }
    </mat-form-field>
    <mat-form-field appearance="fill" data-testid="member-email-field">
      <mat-label>Email</mat-label>
      <input
        matInput
        [formField]="addMemberForm.email"
        data-testid="member-email-input"
        aria-label="Member email"
      />
      @for (error of addMemberForm.email().errors(); track error.kind; let i = $index) {
        <mat-error [attr.data-testid]="'member-email-error-' + i">
          {{ error.message }}
        </mat-error>
      }
    </mat-form-field>
  </mat-dialog-content>
  <mat-dialog-actions data-testid="add-member-actions">
    <button
      mat-raised-button
      class="btn-secondary"
      type="submit"
      defaultButton
      [disabled]="!addMemberForm().valid()"
      (click)="onSubmit()"
      data-testid="add-member-save-button"
      aria-label="Save new member"
    >
      Save
    </button>
    <button
      mat-stroked-button
      [mat-dialog-close]="false"
      type="button"
      data-testid="add-member-cancel-button"
      aria-label="Cancel adding member"
    >
      Cancel
    </button>
  </mat-dialog-actions>
</form>
