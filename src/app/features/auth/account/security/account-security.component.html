<div class="container" data-testid="security-container">
  <h4 data-testid="security-title">Change Password</h4>
  @if (isGoogleUser()) {
    <p class="helper-text" data-testid="google-security-note">
      Your account security is managed by Google.
    </p>
  } @else {
    <form
      class="container"
      data-testid="password-form"
      aria-label="Change password form"
      (submit)="$event.preventDefault()"
    >
      <mat-form-field data-testid="new-password-field">
        <mat-label>New Password</mat-label>
        <!-- // NOSONAR -->
        <input
          matInput
          [type]="hidePassword() ? 'password' : 'text'"
          autocomplete="new-password"
          [formField]="passwordForm.password"
          data-testid="new-password-input"
          aria-label="Enter new password"
        />
        <button
          mat-icon-button
          matIconSuffix
          (click)="toggleHidePassword()"
          [attr.aria-label]="'Hide password'"
          [attr.aria-pressed]="hidePassword()"
          data-testid="toggle-new-password-visibility"
        >
          <mat-icon>
            {{ hidePassword() ? 'visibility_off' : 'visibility' }}
          </mat-icon>
        </button>
      </mat-form-field>
      <mat-form-field>
        <mat-label>Confirm Password</mat-label>
        <!-- // NOSONAR -->
        <input
          matInput
          [type]="hideConfirm() ? 'password' : 'text'"
          autocomplete="new-password"
          [formField]="passwordForm.confirmPassword"
        />
        <button
          mat-icon-button
          matIconSuffix
          (click)="toggleHideConfirm()"
          [attr.aria-label]="'Hide password'"
          [attr.aria-pressed]="hideConfirm()"
        >
          <mat-icon>
            {{ hideConfirm() ? 'visibility_off' : 'visibility' }}
          </mat-icon>
        </button>
        @if (
          passwordForm().errors().some(e => e.message === 'Passwords do not match.') &&
          passwordForm.confirmPassword().touched()
        ) {
          <mat-error>Passwords do not match.</mat-error>
        }
      </mat-form-field>
      <button
        mat-raised-button
        class="btn-primary"
        type="submit"
        [disabled]="
          !passwordForm().valid() ||
          passwordForm.confirmPassword().value() === ''
        "
        (click)="onSubmitPassword()"
        data-testid="change-password-button"
      >
        Change Password
      </button>
    </form>
  }
</div>
