<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="description"
      content="PipSplit helps you effortlessly track and split shared expenses with unlimited groups. Perfect for roommates, friends, and group trips. Free expense-sharing app with detailed summaries and payment tracking."
    />
    <meta name="author" content="Michael A Pipkin" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph tags for social media -->
    <meta
      property="og:title"
      content="PipSplit - Fair Expense Splitting Made Easy"
    />
    <meta
      property="og:description"
      content="PipSplit helps you effortlessly track and split shared expenses with unlimited groups. Perfect for roommates, friends, and group trips. Free expense-sharing app with detailed summaries and payment tracking."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://pipsplit.com" />
    <meta
      property="og:image"
      content="https://pipsplit.com/assets/images/pip_split_icon_512x512.png"
    />
    <meta property="og:site_name" content="PipSplit" />

    <!-- Twitter Card tags -->
    <meta name="twitter:card" content="summary" />
    <meta
      name="twitter:title"
      content="PipSplit - Fair Expense Splitting Made Easy"
    />
    <meta
      name="twitter:description"
      content="PipSplit helps you effortlessly track and split shared expenses with unlimited groups. Perfect for roommates, friends, and group trips."
    />
    <meta
      name="twitter:image"
      content="https://pipsplit.com/assets/images/pip_split_icon_512x512.png"
    />
    <!-- // NOSONAR -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"
    />

    <title>PipSplit - Fair Expense Splitting Made Easy</title>
    <base href="/" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="assets/images/transparent_icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="assets/images/transparent_icon.png"
    />
    <link rel="manifest" href="manifest.json" />
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Open%20Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons|Material+Icons+Outlined|Material+Icons+Filled"
      rel="stylesheet"
    />
    <script
      src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"
      integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
      crossorigin="anonymous"
    ></script>
    <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
    <!-- AdSense is loaded conditionally via AdSenseService (browser only, not native app) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "PipSplit",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Android, Web",
        "description": "A free expense splitting app for groups.",
        "url": "https://pipsplit.com",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    </script>
  </head>

  <body class="mat-app-background">
    <app-root></app-root>
  </body>
</html>
