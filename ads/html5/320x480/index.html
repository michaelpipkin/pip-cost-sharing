<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="ad.size" content="width=320,height=480">
  <title>PipSplit</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px; height: 480px; overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      cursor: pointer; background: #a3c498; position: relative;
      border: 1px solid rgba(0,0,0,0.12);
      -webkit-tap-highlight-color: transparent;
    }

    /* ── FRAMES ─────────────────────────────────────────── */
    .frame {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #a3c498; padding: 24px 20px 92px;
      opacity: 0; transition: opacity 0.45s ease;
    }
    .frame.active { opacity: 1; }

    /* ── SHARED ──────────────────────────────────────────── */
    .logo, .cta-logo { display: block; }
    .logo     { margin: 14px 0 10px; }
    .cta-logo { margin: 0 0 8px; }

    /* ── INTRO ───────────────────────────────────────────── */
    #intro .pip-title {
      font-size: 52px; font-weight: 800; color: #111;
      letter-spacing: -1.5px; line-height: 1;
    }
    #intro .tagline {
      font-size: 15px; font-weight: 700; color: #1a2e1a;
      text-align: center; margin-bottom: 18px;
    }
    #intro .pills {
      display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
    }
    #intro .pills span {
      background: rgba(29,74,26,0.18); color: #1a3a1a;
      padding: 5px 12px; border-radius: 20px;
      font-size: 11px; font-weight: 700;
    }

    /* ── DEMO ────────────────────────────────────────────── */
    #demo .demo-label {
      font-size: 13px; font-weight: 700; color: #1a3a1a;
      margin-bottom: 12px; text-align: center;
    }
    #demo .card {
      width: 280px; border-radius: 10px; overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.24);
    }
    #demo .card-hd {
      background: #1d4a1a; color: white; text-align: center;
      padding: 9px 12px; font-size: 15px; font-weight: 700;
    }
    #demo .card-body { background: #f0f2e8; }
    #demo .row {
      display: flex; justify-content: space-between;
      padding: 9px 14px; font-size: 13px; color: #1a2e1a;
      border-bottom: 1px solid #dce8d4;
    }
    #demo .row:nth-child(even) { background: #e8f5e3; }
    #demo .row .name { font-weight: 600; }
    #demo .row .amt  { font-weight: 700; color: #1d4a1a; }
    #demo .card-ft {
      background: #1d4a1a; display: flex; justify-content: space-between;
      padding: 9px 14px; font-size: 13px; font-weight: 700; color: white;
    }
    #demo .note {
      margin-top: 14px; font-size: 12px; font-weight: 700;
      color: #1a3a1a; text-align: center;
    }

    /* ── CTA ─────────────────────────────────────────────── */
    #cta .cta-head {
      font-size: 38px; font-weight: 800; color: #111;
      text-align: center; line-height: 1.1; margin-bottom: 14px;
    }
    #cta .cta-tag {
      font-size: 13px; font-weight: 600; color: #222;
      text-align: center; margin-bottom: 16px;
    }
    #cta .pills {
      display: flex; gap: 8px; flex-wrap: wrap;
      justify-content: center; margin-bottom: 16px;
    }
    #cta .pills span {
      background: rgba(29,74,26,0.18); color: #1a3a1a;
      padding: 5px 12px; border-radius: 20px;
      font-size: 11px; font-weight: 700;
    }
  </style>
</head>
<body onclick="window.open(window.clickTag)">
<script>var clickTag = "https://play.google.com/store/apps/details?id=com.pipsplit.app";</script>

<!-- ── FRAME 1: INTRO ──────────────────────────────────── -->
<div id="intro" class="frame active">
  <div class="pip-title">PipSplit</div>
  <img class="logo" src="__ICON_DATA_URI__" width="96" height="96" alt="PipSplit">
  <div class="tagline">Fair Expense Splitting, Made Easy</div>
  <div class="pills">
    <span>&#10003; Free</span>
    <span>&#10003; Unlimited groups</span>
  </div>
</div>

<!-- ── FRAME 2: DEMO ──────────────────────────────────── -->
<div id="demo" class="frame">
  <div class="demo-label">Split any expense in seconds</div>
  <div class="card">
    <div class="card-hd">Split Expense</div>
    <div class="card-body">
      <div class="row"><span class="name">Alice</span><span class="amt">$20.74</span></div>
      <div class="row"><span class="name">Bob</span><span class="amt">$21.85</span></div>
      <div class="row"><span class="name">Charlie</span><span class="amt">$22.74</span></div>
    </div>
    <div class="card-ft"><span>Total</span><span>$65.33</span></div>
  </div>
  <div class="note">No account needed to split a single expense!</div>
</div>

<!-- ── FRAME 3: CTA ───────────────────────────────────── -->
<div id="cta" class="frame">
  <div class="cta-head">Try PipSplit<br>Today!</div>
  <img class="cta-logo" src="__ICON_DATA_URI__" width="72" height="72" alt="PipSplit">
  <div class="cta-tag">Fair Expense Splitting, Made Easy</div>
  <div class="pills">
    <span>&#10003; Free</span>
    <span>&#10003; Unlimited groups</span>
  </div>
</div>

<script>
  var f = ['intro', 'demo', 'cta'];
  function show(i) {
    f.forEach(function(id, j) {
      document.getElementById(id).classList.toggle('active', j === i);
    });
  }
  setTimeout(function() { show(1); }, 3200);
  setTimeout(function() { show(2); }, 6400);
  setInterval(function() {
    show(0);
    setTimeout(function() { show(1); }, 3200);
    setTimeout(function() { show(2); }, 6400);
  }, 9600);
</script>
</body>
</html>
