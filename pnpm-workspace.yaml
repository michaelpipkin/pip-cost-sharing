packages:
  - .
  - scripts/db
updateConfig:
  ignoreDependencies:
    - typescript
overrides:
  '@babel/core': '>=7.29.6 <8'
  esbuild: '>=0.28.1 <0.29'
  tar: '>=7.5.16 <8'
  uuid: '>=11.1.1 <12'
allowBuilds:
  '@firebase/util': true
  '@parcel/watcher': true
  core-js: true
  esbuild: true
  lmdb: true
  msgpackr-extract: true
  protobufjs: true
  sharp: true
  unrs-resolver: true
minimumReleaseAgeExclude:
  - dependabot-agent
